"$schema" = 'https://starship.rs/config-schema.json'

format = """
$fill\
[Óā∂](red)\
$os\
$username\
[Óāį](bg:peach fg:red)\
$directory\
[Óāį](bg:yellow fg:peach)\
$git_branch\
$git_status\
[Óāį](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$java\
$kotlin\
$python\
[Óāį](fg:green bg:sapphire)\
$conda\
[Óāį](fg:sapphire bg:lavender)\
$time\
[Óāī ](fg:lavender)\
$cmd_duration\
$fill\
$line_break\
$character"""

palette = 'catppuccin_mocha'

[fill]
symbol = " "

[os]
disabled = false
style    = "bg:red fg:crust"

[os.symbols]
Macos = "ůįÄĶ"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style  = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[git_branch]
symbol = "Ôźė"
style  = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style  = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[nodejs]
symbol = "Óúė"
style  = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = "Óėě"
style  = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "Óě®"
style  = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "Óėß"
style  = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "ÓČĖ"
style  = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "Óėī"
style  = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "ÓėÜ"
style  = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[docker_context]
symbol = "ÔĆą"
style  = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[time]
disabled = false
time_format = "%R"
style  = "bg:lavender"
format = '[[ Ôźļ $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[‚ĚĮ](bold fg:green)'
error_symbol = '[‚ĚĮ](bold fg:red)'
vicmd_symbol = '[‚Ěģ](bold fg:green)'

[cmd_duration]
show_milliseconds = false
format = "Óęī in $duration "
style  = "bg:lavender"
disabled = true
show_notifications = false
min_time_to_notify = 45000

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
